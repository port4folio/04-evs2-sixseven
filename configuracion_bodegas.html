<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Múltiples Bodegas - ERP Seguridad LTDA</title>
    <style>
        /* --- ESTILOS CSS GENERALES --- */
        :root {
            --primary-color: #1e3a8a; /* Azul corporativo para Seguridad LTDA */
            --secondary-color: #3b82f6;
            --background-color: #f8fafc;
            --card-background: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-background);
            width: 100%;
            max-width: 850px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border-top: 6px solid var(--primary-color);
        }

        /* Encabezado */
        .header {
            background-color: #fafbfc;
            padding: 25px 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            color: #64748b;
        }

        /* Formulario */
        .form-container {
            padding: 30px;
        }

        /* Formulario de Datos */
        .fields-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 500px) {
            .fields-section {
                grid-template-columns: 1fr 1fr;
            }
            .full-width {
                grid-column: span 2;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }

        .form-group label .required {
            color: var(--error-color);
            margin-left: 3px;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-color);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* Alertas de Validación */
        .error-message {
            color: var(--error-color);
            font-size: 11px;
            margin-top: 4px;
            display: none;
        }

        /* Sección de acciones (Botones) */
        .form-actions {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 11px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-secondary {
            background-color: transparent;
            color: #64748b;
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #f1f5f9;
            color: var(--text-color);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #172554;
        }

        /* Notificación de Éxito */
        .toast-success {
            display: none;
            background-color: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #065f46;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Encabezado de la vista -->
        <div class="header">
            <h1>Configuración de Múltiples Bodegas</h1>
            <p>Módulo de Inventario: Ingrese los datos para la creación y gestión de una nueva sucursal o centro de acopio.</p>
        </div>

        <div class="form-container">
            <!-- Mensaje de éxito oculto por defecto -->
            <div class="toast-success" id="successMessage">
                <strong>✓ Éxito:</strong> La bodega ha sido registrada correctamente en el sistema.
            </div>

            <form action="#" method="POST" id="bodegaForm">
                
                <div class="fields-section">
                    
                    <!-- Código de Bodega -->
                    <div class="form-group">
                        <label for="codigoBodega">Código de Bodega <span class="required">*</span></label>
                        <input type="text" id="codigoBodega" placeholder="Ej. BGA-001" required>
                        <span class="error-message">Este campo es obligatorio.</span>
                    </div>

                    <!-- Nombre de Bodega -->
                    <div class="form-group">
                        <label for="nombreBodega">Nombre de la Bodega <span class="required">*</span></label>
                        <input type="text" id="nombreBodega" placeholder="Ej. Bodega Central Norte" required>
                    </div>

                    <!-- Tipo de Bodega (Según Requerimientos: Reservas, Consignaciones, etc.) -->
                    <div class="form-group">
                        <label for="tipoBodega">Clasificación / Tipo <span class="required">*</span></label>
                        <select id="tipoBodega" required>
                            <option value="" disabled selected>Seleccione el tipo...</option>
                            <option value="principal">Bodega Principal</option>
                            <option value="reserva">Bodega de Reservas</option>
                            <option value="consignacion">Bodega de Consignaciones</option>
                            <option value="transito">Bodega en Tránsito</option>
                        </select>
                    </div>

                    <!-- Estado -->
                    <div class="form-group">
                        <label for="estadoBodega">Estado de Operación <span class="required">*</span></label>
                        <select id="estadoBodega" required>
                            <option value="activa" selected>Activa</option>
                            <option value="inactiva">Inactiva</option>
                            <option value="mantenimiento">En Mantenimiento</option>
                        </select>
                    </div>

                    <!-- Dirección (Ocupa todo el ancho) -->
                    <div class="form-group full-width">
                        <label for="direccionBodega">Ubicación Física <span class="required">*</span></label>
                        <input type="text" id="direccionBodega" placeholder="Dirección completa de las instalaciones" required>
                    </div>

                    <!-- Encargado de Bodega -->
                    <div class="form-group">
                        <label for="encargadoBodega">Jefe o Encargado de Bodega</label>
                        <input type="text" id="encargadoBodega" placeholder="Nombre del responsable">
                    </div>

                    <!-- Capacidad o Nivel Máximo -->
                    <div class="form-group">
                        <label for="capacidadBodega">Capacidad Máxima (Niveles de Stock)</label>
                        <input type="number" id="capacidadBodega" placeholder="Cantidad de pallets o m2">
                    </div>

                    <!-- Observaciones (Ocupa todo el ancho) -->
                    <div class="form-group full-width">
                        <label for="observaciones">Observaciones / Detalles Adicionales</label>
                        <textarea id="observaciones" rows="3" placeholder="Restricciones de entrada/salida, centros de costo asociados, etc."></textarea>
                    </div>

                </div>

                <!-- Botones de Acción -->
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('bodegaForm').reset();">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="document.getElementById('successMessage').style.display='block';">Guardar Bodega</button>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
