<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Múltiples Bodegas - ERP Seguridad LTDA</title>
    <!-- Enlace al archivo CSS externo -->
    <link rel="stylesheet" href="styles_config_bodegas.css">
</head>
<body>

    <div class="container">
        <!-- Encabezado de la vista -->
        <div class="header">
            <h1>Configuración de Múltiples Bodegas</h1>
            <p>Módulo de Inventario: Ingrese los datos para la creación y gestión de una nueva sucursal o centro de acopio.</p>
        </div>

        <div class="form-container">
            <!-- Mensaje de éxito oculto por defecto -->
            <div class="toast-success" id="successMessage">
                <strong>✓ Éxito:</strong> La bodega ha sido registrada correctamente en el sistema.
            </div>

            <form action="#" method="POST" id="bodegaForm">
                
                <div class="fields-section">
                    
                    <!-- Código de Bodega -->
                    <div class="form-group">
                        <label for="codigoBodega">Código de Bodega <span class="required">*</span></label>
                        <input type="text" id="codigoBodega" placeholder="Ej. BGA-001" required>
                        <span class="error-message">Este campo es obligatorio.</span>
                    </div>

                    <!-- Nombre de Bodega -->
                    <div class="form-group">
                        <label for="nombreBodega">Nombre de la Bodega <span class="required">*</span></label>
                        <input type="text" id="nombreBodega" placeholder="Ej. Bodega Central Norte" required>
                    </div>

                    <!-- Tipo de Bodega -->
                    <div class="form-group">
                        <label for="tipoBodega">Clasificación / Tipo <span class="required">*</span></label>
                        <select id="tipoBodega" required>
                            <option value="" disabled selected>Seleccione el tipo...</option>
                            <option value="principal">Bodega Principal</option>
                            <option value="reserva">Bodega de Reservas</option>
                            <option value="consignacion">Bodega de Consignaciones</option>
                            <option value="transito">Bodega en Tránsito</option>
                        </select>
                    </div>

                    <!-- Estado -->
                    <div class="form-group">
                        <label for="estadoBodega">Estado de Operación <span class="required">*</span></label>
                        <select id="estadoBodega" required>
                            <option value="activa" selected>Activa</option>
                            <option value="inactiva">Inactiva</option>
                            <option value="mantenimiento">En Mantenimiento</option>
                        </select>
                    </div>

                    <!-- Dirección -->
                    <div class="form-group full-width">
                        <label for="direccionBodega">Ubicación Física <span class="required">*</span></label>
                        <input type="text" id="direccionBodega" placeholder="Dirección completa de las instalaciones" required>
                    </div>

                    <!-- Encargado de Bodega -->
                    <div class="form-group">
                        <label for="encargadoBodega">Jefe o Encargado de Bodega</label>
                        <input type="text" id="encargadoBodega" placeholder="Nombre del responsable">
                    </div>

                    <!-- Capacidad o Nivel Máximo -->
                    <div class="form-group">
                        <label for="capacidadBodega">Capacidad Máxima (Niveles de Stock)</label>
                        <input type="number" id="capacidadBodega" placeholder="Cantidad de pallets o m2">
                    </div>

                    <!-- Observaciones -->
                    <div class="form-group full-width">
                        <label for="observaciones">Observaciones / Detalles Adicionales</label>
                        <textarea id="observaciones" rows="3" placeholder="Restricciones de entrada/salida, centros de costo asociados, etc."></textarea>
                    </div>

                </div>

                <!-- Botones de Acción -->
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('bodegaForm').reset();">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="document.getElementById('successMessage').style.display='block';">Guardar Bodega</button>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
